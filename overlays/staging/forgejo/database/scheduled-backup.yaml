apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: forgejo-weekly-backup
  namespace: forgejo-staging
spec:
  schedule: "0 0 3 * * 0"
  backupOwnerReference: cluster

  cluster:
    name: forgejo-postgres-cnpg

  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
