apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: forgejo-postgres-cnpg
  namespace: forgejo-staging
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:16

  storage:
    storageClass: synology-iscsi-storage
    size: 20Gi

  bootstrap:
    initdb:
      database: forgejo
      owner: forgejo

  plugins:
    - name: barman-cloud.cloudnative-pg.io

      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: forgejo-backup
