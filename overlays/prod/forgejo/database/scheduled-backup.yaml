apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: forgejo-daily-backup
  namespace: forgejo-prod
spec:
  schedule: "0 0 2 * * *"
  backupOwnerReference: cluster

  cluster:
    name: forgejo-postgres-cnpg

  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
