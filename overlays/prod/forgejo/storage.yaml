apiVersion: v1
kind: PersistentVolume
metadata:
  name: forgejo-prod-nfs-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: forgejo-nfs
  mountOptions:
    - nfsvers=4
  nfs:
    server: 192.168.1.141
    path: /volume1/data/k3s/forgejo/production
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-data
spec:
  volumeName: forgejo-prod-nfs-pv
  accessModes:
    - ReadWriteOnce
  storageClassName: forgejo-nfs
  resources:
    requests:
      storage: 100Gi
