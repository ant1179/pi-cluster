apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-forgejo-data
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/gitea/custom/conf /var/lib/gitea/git /var/lib/gitea/ssh
              chmod 755 /var/lib/gitea
              chmod 755 /var/lib/gitea/custom
              chmod 755 /var/lib/gitea/custom/conf
              chmod 700 /var/lib/gitea/git
              chmod 700 /var/lib/gitea/ssh
              touch /var/lib/gitea/custom/conf/app.ini
              chmod 644 /var/lib/gitea/custom/conf/app.ini
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: forgejo-data
              mountPath: /var/lib/gitea
      containers:
        - name: forgejo
          image: data.forgejo.org/forgejo/forgejo:13.0.3-rootless
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: ssh
              containerPort: 8022
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GUID
              value: "1000"
            - name: FORGEJO__database__DB_TYPE
              value: postgres
            - name: FORGEJO__database__HOST
              value: forgejo-postgres:5432
            - name: FORGEJO__database__NAME
              valueFrom:
                secretKeyRef:
                  name: forgejo-postgres-secret
                  key: POSTGRES_DB
            - name: FORGEJO__database__USER
              valueFrom:
                secretKeyRef:
                  name: forgejo-postgres-secret
                  key: POSTGRES_USER
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: FORGEJO__security__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: forgejo-secret
                  key: SECRET_KEY
            - name: FORGEJO__security__INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-secret
                  key: INTERNAL_TOKEN
            - name: FORGEJO__server__START_SSH_SERVER
              value: "true"
            - name: FORGEJO__server__SSH_LISTEN_PORT
              value: "8022"
            - name: FORGEJO__server__SSH_PORT
              value: "8022"
          volumeMounts:
            - name: forgejo-data
              mountPath: /var/lib/gitea
            - name: tmp
              mountPath: /tmp
            - name: var-tmp
              mountPath: /var/tmp
            - name: run
              mountPath: /run
            - name: var-run
              mountPath: /var/run
      volumes:
        - name: forgejo-data
          persistentVolumeClaim:
            claimName: forgejo-data
        - name: tmp
          emptyDir: {}
        - name: var-tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: var-run
          emptyDir: {}
