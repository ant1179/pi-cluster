apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      containers:
        - name: forgejo
          image: codeberg.io/forgejo/forgejo:11
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: FORGEJO__database__DB_TYPE
              value: postgres
            - name: FORGEJO__database__HOST
              value: forgejo-postgres:5432
            - name: FORGEJO__database__NAME
              valueFrom:
                secretRef:
                  name: forgejo-postgres-secret
                  key: POSTGRES_DB
            - name: FORGEJO__database__USER
              valueFrom:
                secretRef:
                  name: forgejo-postgres-secret
                  key: POSTGRES_USER
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretRef:
                  name: forgejo-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: FORGEJO__security__SECRET_KEY
              valueFrom:
                secretRef:
                  name: forgejo-secret
                  key: SECRET_KEY
            - name: FORGEJO__security__INTERNAL_TOKEN
              valueFrom:
                secretRef:
                  name: forgejo-secret
                  key: INTERNAL_TOKEN
          volumeMounts:
            - name: forgejo-data
              mountPath: /data
    volumes:
      - name: forgejo-data
        persistentVolumeClaim:
          claimName: forgejo-data

